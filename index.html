<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pond Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#f3f4f6;color:#111}
  header{background:#15803d;color:#fff;padding:14px 16px;position:sticky;top:0;z-index:10}
  header h1{font-size:18px}header p{font-size:12px;opacity:.8}
  nav{display:flex;overflow-x:auto;background:#fff;border-bottom:1px solid #e5e7eb}
  nav button{padding:10px 14px;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;color:#6b7280}
  nav button.active{color:#15803d;border-bottom-color:#15803d}
  main{padding:12px;max-width:640px;margin:auto}
  .card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:14px;margin-bottom:12px}
  .card h3{font-size:14px;font-weight:700;margin-bottom:10px;color:#374151}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .stat{background:#f9fafb;border-radius:8px;padding:10px;text-align:center}
  .stat .label{font-size:11px;color:#9ca3af;margin-bottom:2px}
  .stat .value{font-size:15px;font-weight:700}
  .green{color:#16a34a}.red{color:#dc2626}.blue{color:#2563eb}
  label{display:block;font-size:12px;font-weight:600;color:#6b7280;margin-bottom:3px}
  input,select{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;background:#fff}
  input:focus,select:focus{outline:none;border-color:#15803d}
  .row{display:flex;gap:8px;margin-bottom:8px}
  .row>*{flex:1}
  btn, .btn{display:inline-block;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:700;border:none;cursor:pointer}
  .btn-green{background:#15803d;color:#fff}
  .btn-red{background:#dc2626;color:#fff}
  .btn-sm{padding:4px 10px;font-size:12px;border-radius:6px}
  .entry{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:13px}
  .entry:last-child{border-bottom:none}
  .entry .meta{color:#9ca3af;font-size:11px}
  .badge{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600}
  .badge-green{background:#dcfce7;color:#15803d}
  .badge-red{background:#fee2e2;color:#dc2626}
  .verdict{border-radius:12px;border:2px solid;padding:14px;margin-bottom:12px}
  .verdict.green{border-color:#86efac;background:#f0fdf4}
  .verdict.yellow{border-color:#fde68a;background:#fffbeb}
  .verdict.red{border-color:#fca5a5;background:#fff1f2}
  .verdict.gray{border-color:#e5e7eb;background:#f9fafb}
  .verdict h2{font-size:16px;font-weight:700;margin-bottom:2px}
  .verdict p{font-size:13px;color:#6b7280}
  .tab{display:none}.tab.active{display:block}
  .section-title{font-size:12px;font-weight:700;color:#9ca3af;text-transform:uppercase;margin:16px 0 8px}
  .pond-select{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .pond-select button{padding:6px 14px;border-radius:999px;border:2px solid #e5e7eb;background:#fff;font-size:13px;font-weight:600;cursor:pointer}
  .pond-select button.active{border-color:#15803d;color:#15803d}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;display:none;z-index:99}
</style>
</head>
<body>

<header>
  <h1>🐟 Pond Tracker</h1>
  <p id="subtitle">Bangladesh</p>
</header>

<nav>
  <button class="active" onclick="showTab('home')">Home</button>
  <button onclick="showTab('log')">Log</button>
  <button onclick="showTab('entries')">History</button>
  <button onclick="showTab('settings')">Settings</button>
</nav>

<main>

<!-- HOME -->
<div id="tab-home" class="tab active">
  <div id="pond-verdicts"></div>
  <div class="card">
    <h3>📊 All Ponds Combined</h3>
    <div class="grid3">
      <div class="stat"><div class="label">Revenue</div><div class="value green" id="total-rev">৳0</div></div>
      <div class="stat"><div class="label">Costs</div><div class="value red" id="total-cost">৳0</div></div>
      <div class="stat"><div class="label">Profit</div><div class="value blue" id="total-profit">৳0</div></div>
    </div>
  </div>
</div>

<!-- LOG -->
<div id="tab-log" class="tab">
  <div class="pond-select" id="log-pond-select"></div>

  <div class="card">
    <h3>🐟 Fish Purchase</h3>
    <div class="row">
      <div><label>Fish Type</label><input id="fp-type" placeholder="e.g. Rohu"/></div>
      <div><label>Qty</label><input id="fp-qty" type="number" placeholder="500"/></div>
    </div>
    <div class="row">
      <div><label>Weight (kg)</label><input id="fp-kg" type="number" placeholder="50"/></div>
      <div><label>Price/kg (৳)</label><input id="fp-price" type="number" placeholder="120"/></div>
    </div>
    <div style="margin-bottom:8px"><label>Date</label><input id="fp-date" type="date"/></div>
    <button class="btn btn-green" onclick="logEntry('purchase')">Add Purchase</button>
  </div>

  <div class="card">
    <h3>💰 Fish Sale</h3>
    <div class="row">
      <div><label>Fish Type</label><input id="fs-type" placeholder="e.g. Rohu"/></div>
      <div><label>Qty</label><input id="fs-qty" type="number" placeholder="100"/></div>
    </div>
    <div class="row">
      <div><label>Weight (kg)</label><input id="fs-kg" type="number" placeholder="40"/></div>
      <div><label>Price/kg (৳)</label><input id="fs-price" type="number" placeholder="200"/></div>
    </div>
    <div class="row">
      <div><label>Buyer</label><input id="fs-buyer" placeholder="Optional"/></div>
    </div>
    <div style="margin-bottom:8px"><label>Date</label><input id="fs-date" type="date"/></div>
    <button class="btn btn-green" onclick="logEntry('sale')">Add Sale</button>
  </div>

  <div class="card">
    <h3>💸 Expense</h3>
    <div class="row">
      <div>
        <label>Category</label>
        <select id="exp-cat">
          <option>Rent</option>
          <option>Feed</option>
          <option>Labor</option>
          <option>Medicine</option>
          <option>Equipment</option>
          <option>Other</option>
        </select>
      </div>
      <div><label>Amount (৳)</label><input id="exp-amount" type="number" placeholder="5000"/></div>
    </div>
    <div style="margin-bottom:8px"><label>Notes</label><input id="exp-notes" placeholder="Optional"/></div>
    <div style="margin-bottom:8px"><label>Date</label><input id="exp-date" type="date"/></div>
    <label style="margin-bottom:8px;display:flex;align-items:center;gap:6px;cursor:pointer">
      <input type="checkbox" id="exp-shared" style="width:auto"/> Split across all ponds
    </label>
    <button class="btn btn-red" onclick="logEntry('expense')">Add Expense</button>
  </div>
</div>

<!-- HISTORY -->
<div id="tab-entries" class="tab">
  <div class="pond-select" id="hist-pond-select"></div>
  <div id="history-list"></div>
</div>

<!-- SETTINGS -->
<div id="tab-settings" class="tab">
  <div class="card">
    <h3>⚙️ Pond Names</h3>
    <div id="pond-name-inputs"></div>
    <button class="btn btn-green" onclick="savePondNames()">Save Names</button>
  </div>
  <div class="card" style="margin-top:12px">
    <h3>🗑 Reset</h3>
    <p style="font-size:13px;color:#6b7280;margin-bottom:10px">Delete all data permanently.</p>
    <button class="btn btn-red" onclick="resetAll()">Reset All Data</button>
  </div>
</div>

</main>
<div id="toast"></div>

<script>
const SUPABASE_URL = "https://hmvrgrmirkdcbmyyifjq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtdnJncm1pcmtkY2JteXlpZmpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MDYyNzAsImV4cCI6MjA5MTI4MjI3MH0._Oq5Q2jkBT6XZyHBhc2zALIDa64ZCNuExHjWBY2vzPk";

let lastDates = { purchase: today(), sale: today(), expense: today() };
let activePond = null, activeHistPond = null;
let lastDates = { purchase: today(), sale: today(), expense: today() };

const h = (url, opts={}) => fetch(`${SUPABASE_URL}/rest/v1/${url}`, {
  headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", Prefer: opts.prefer||"return=representation" },
  ...opts
}).then(async r => { const t = await r.text(); return t ? JSON.parse(t) : []; });

const get = (t,q="") => h(`${t}?${q}`);
const ins = (t,b) => h(t, { method:"POST", body:JSON.stringify(b) });
const del = (t,q) => h(`${t}?${q}`, { method:"DELETE", prefer:"return=minimal" });

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.style.display = "block";
  setTimeout(() => el.style.display = "none", 2000);
}

function fmt(n) { return "৳" + Math.round(n||0).toLocaleString("en-IN"); }
function today() { return new Date().toISOString().split("T")[0]; }

async function load() {
  ponds = await get("ponds","order=created_at.asc");
  entries = await get("simple_entries","order=created_at.desc");
  if (!activePond && ponds.length) activePond = ponds[0].id;
  if (!activeHistPond && ponds.length) activeHistPond = ponds[0].id;
  render();
}

function render() {
  renderPondSelects();
  renderHome();
  renderHistory();
  renderSettings();
}

function renderPondSelects() {
  ["log-pond-select","hist-pond-select"].forEach((id, i) => {
    const pid = i===0 ? activePond : activeHistPond;
    const fn = i===0 ? (id=>{ activePond=id; renderPondSelects(); }) : (id=>{ activeHistPond=id; renderHistory(); renderPondSelects(); });
    document.getElementById(id).innerHTML = ponds.map(p =>
      `<button class="${p.id===pid?'active':''}" onclick="(${fn.toString()})('${p.id}')">${p.name}</button>`
    ).join("");
  });
}

function pondStats(pid) {
  const isAll = pid==="all";
  const sharedExp = entries.filter(e=>e.type==="expense"&&e.shared);
  const directExp = entries.filter(e=>e.type==="expense"&&!e.shared&&(isAll||e.pond_id===pid));
  const sharedShare = sharedExp.reduce((s,e)=>s+Number(e.amount),0) / Math.max(ponds.length,1);
  const expenses = directExp.reduce((s,e)=>s+Number(e.amount),0) + sharedShare;
  const purchases = entries.filter(e=>e.type==="purchase"&&(isAll||e.pond_id===pid)).reduce((s,e)=>s+Number(e.amount),0);
  const revenue = entries.filter(e=>e.type==="sale"&&(isAll||e.pond_id===pid)).reduce((s,e)=>s+Number(e.amount),0);
  const totalCost = expenses + purchases;
  const profit = revenue - totalCost;
  return { revenue, totalCost, profit };
}

function verdict(s, name) {
  if (s.revenue===0 && s.totalCost===0) return { cls:"gray", emoji:"⚪", head:"No data yet", detail:"Start logging for "+name+"." };
  if (s.profit < 0) return { cls:"red", emoji:"🔴", head:"Losing money", detail:name+" is spending more than it earns." };
  if (s.profit === 0) return { cls:"yellow", emoji:"🟡", head:"Breaking even", detail:name+" has no profit yet." };
  return { cls:"green", emoji:"🟢", head:"Making profit", detail:name+" is profitable!" };
}

function renderHome() {
  const vs = ponds.map(p => {
    const s = pondStats(p.id);
    const v = verdict(s, p.name);
    return `<div class="verdict ${v.cls}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h2>${p.name}</h2><span style="font-size:22px">${v.emoji}</span>
      </div>
      <div style="font-size:16px;font-weight:700;margin:4px 0">${v.head}</div>
      <div style="font-size:13px;color:#6b7280;margin-bottom:10px">${v.detail}</div>
      <div class="grid3">
        <div class="stat"><div class="label">Money In</div><div class="value green">${fmt(s.revenue)}</div></div>
        <div class="stat"><div class="label">Money Spent</div><div class="value red">${fmt(s.totalCost)}</div></div>
        <div class="stat"><div class="label">Profit</div><div class="value ${s.profit>=0?'green':'red'}">${fmt(s.profit)}</div></div>
      </div>
    </div>`;
  }).join("");
  document.getElementById("pond-verdicts").innerHTML = vs;

  const all = pondStats("all");
  document.getElementById("total-rev").textContent = fmt(all.revenue);
  document.getElementById("total-cost").textContent = fmt(all.totalCost);
  document.getElementById("total-profit").textContent = fmt(all.profit);
  document.getElementById("total-profit").className = "value " + (all.profit>=0?"green":"red");
}

function renderHistory() {
  const list = entries.filter(e => e.pond_id===activeHistPond || e.shared);
  const el = document.getElementById("history-list");
  if (!list.length) { el.innerHTML = '<p style="color:#9ca3af;text-align:center;padding:20px;font-size:13px">No entries yet.</p>'; return; }
  el.innerHTML = list.map(e => {
    const isIncome = e.type==="sale";
    const label = e.type==="purchase" ? `🐟 ${e.label}` : e.type==="sale" ? `💰 ${e.label}` : `💸 ${e.label}`;
    return `<div class="card" style="margin-bottom:8px;padding:10px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:13px;font-weight:600">${label}</div>
          <div style="font-size:11px;color:#9ca3af">${e.date}${e.shared?' · Shared':''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="${isIncome?'badge badge-green':'badge badge-red'}">${isIncome?'+':'-'}${fmt(e.amount)}</span>
          <button class="btn btn-red btn-sm" onclick="deleteEntry('${e.id}')">✕</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

function renderSettings() {
  document.getElementById("pond-name-inputs").innerHTML = ponds.map(p =>
    `<div style="margin-bottom:8px"><label>${p.name}</label><input id="pname-${p.id}" value="${p.name}"/></div>`
  ).join("");
}

async function logEntry(type) {
  if (!activePond) return alert("Select a pond first");
  let label="", amount=0, shared=false;

  if (type==="purchase") {
    const t=v("fp-type"),qty=v("fp-qty"),kg=v("fp-kg"),price=v("fp-price"),date=v("fp-date")||lastDates.purchase;
    if (!t||!kg||!price) return alert("Fill required fields");
    lastDates.purchase = date;
    label=`${t} — ${qty} fish, ${kg}kg × ৳${price}/kg`;
    amount=Number(kg)*Number(price);
    await ins("simple_entries",{ pond_id:activePond, type, label, amount, shared, date });
  } else if (type==="sale") {
    const t=v("fs-type"),qty=v("fs-qty"),kg=v("fs-kg"),price=v("fs-price"),buyer=v("fs-buyer"),date=v("fs-date")||lastDates.sale;
    if (!t||!kg||!price) return alert("Fill required fields");
    lastDates.sale = date;
    label=`${t} — ${qty?qty+" fish, ":""}${kg}kg × ৳${price}/kg${buyer?" → "+buyer:""}`;
    amount=Number(kg)*Number(price);
    await ins("simple_entries",{ pond_id:activePond, type, label, amount, shared, date });
  } else if (type==="expense") {
    const cat=v("exp-cat"),amt=v("exp-amount"),notes=v("exp-notes"),date=v("exp-date")||lastDates.expense;
    if (!amt) return alert("Enter amount");
    lastDates.expense = date;
    label=`${cat}${notes?" — "+notes:""}`;
    amount=Number(amt);
    shared=document.getElementById("exp-shared").checked;
    await ins("simple_entries",{ pond_id:activePond, type, label, amount, shared, date });
  }
  toast("✅ Saved!");
  clearForm(type);
  await load();
}

async function deleteEntry(id) {
  if (!confirm("Delete this entry?")) return;
  await del("simple_entries",`id=eq.${id}`);
  toast("Deleted");
  await load();
}

async function savePondNames() {
  for (const p of ponds) {
    const val = document.getElementById("pname-"+p.id)?.value;
    if (val && val !== p.name) {
      await fetch(`${SUPABASE_URL}/rest/v1/ponds?id=eq.${p.id}`, {
        method:"PATCH", headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`, "Content-Type":"application/json", Prefer:"return=minimal" },
        body:JSON.stringify({name:val})
      });
    }
  }
  toast("✅ Names saved!");
  await load();
}

async function resetAll() {
  if (!confirm("Delete ALL data? This cannot be undone.")) return;
  await del("simple_entries","id=neq.00000000-0000-0000-0000-000000000000");
  toast("Reset done");
  await load();
}

function v(id) { return document.getElementById(id)?.value?.trim(); }

function clearForm(type) {
  if (type==="purchase") { ["fp-type","fp-qty","fp-kg","fp-price"].forEach(id=>document.getElementById(id).value=""); document.getElementById("fp-date").value=lastDates.purchase; }
  if (type==="sale") { ["fs-type","fs-qty","fs-kg","fs-price","fs-buyer"].forEach(id=>document.getElementById(id).value=""); document.getElementById("fs-date").value=lastDates.sale; }
  if (type==="expense") { document.getElementById("exp-amount").value=""; document.getElementById("exp-notes").value=""; document.getElementById("exp-date").value=lastDates.expense; document.getElementById("exp-shared").checked=false; }
}

function showTab(name) {
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  event.target.classList.add("active");
}

load();
</script>
</body>
</html>
